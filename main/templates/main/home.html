<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celline - Səsli Asistan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: #16213e;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0f3460;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .header span {
            font-size: 12px;
            color: #888;
            margin-left: auto;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #16213e;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 3px;
        }

        .welcome-message {
            text-align: center;
            margin: auto;
            color: #666;
        }

        .welcome-message .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-message h2 {
            font-size: 22px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .welcome-message p {
            font-size: 14px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #e94560, #c23152);
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, #0f3460, #533483);
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #e94560;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            background: #1a1a2e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            border: 1px solid #0f3460;
        }

        /* Bottom Panel */
        .bottom-panel {
            background: #1a1a2e;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #0f3460;
        }

        .status-text {
            font-size: 13px;
            color: #888;
            height: 20px;
            transition: all 0.3s ease;
        }

        .status-text.active {
            color: #e94560;
        }

        /* Mic Button */
        .mic-container {
            position: relative;
            width: 72px;
            height: 72px;
        }

        .mic-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.4);
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #ff6b6b, #e94560);
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.6);
        }

        .mic-btn.disabled {
            background: #333;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .mic-btn.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        /* Pulse animation */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid #e94560;
            opacity: 0;
            z-index: 1;
        }

        .recording .pulse-ring {
            animation: pulse 1.5s ease-out infinite;
        }

        .mic-container.recording .pulse-ring {
            animation: pulse 1.5s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                width: 72px;
                height: 72px;
                opacity: 0.6;
            }
            100% {
                width: 120px;
                height: 120px;
                opacity: 0;
            }
        }

        /* Wave animation */
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 24px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wave-container.active {
            opacity: 1;
        }

        .wave-bar {
            width: 3px;
            height: 8px;
            background: #e94560;
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }

        /* Thinking dots */
        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: thinking 1.2s ease-in-out infinite;
        }

        .thinking-dots span:nth-child(1) { animation-delay: 0s; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes thinking {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hint {
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">🎙</div>
        <h1>Celline</h1>
        <span>Səsli Asistan</span>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome-message" id="welcome">
            <div class="icon">🎙</div>
            <h2>Salam!</h2>
            <p>Mikrofon düyməsinə basın və danışın</p>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="wave-container" id="waveContainer">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="status-text" id="statusText"></div>
        <div class="mic-container" id="micContainer">
            <div class="pulse-ring"></div>
            <button class="mic-btn" id="micBtn">🎤</button>
        </div>
        <div class="hint">Bas → Danış → Susanda avtomatik göndərir</div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const micBtn = document.getElementById('micBtn');
        const micContainer = document.getElementById('micContainer');
        const statusText = document.getElementById('statusText');
        const waveContainer = document.getElementById('waveContainer');
        const welcome = document.getElementById('welcome');

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let isProcessing = false;
        let currentAudio = null;

        // Silence detection
        let audioContext = null;
        let analyser = null;
        let silenceTimer = null;
        let speechDetected = false;
        let silenceCheckInterval = null;
        const SILENCE_THRESHOLD = 15;      // Volume threshold (0-255)
        const SILENCE_DURATION = 1500;      // ms of silence before auto-stop
        const MIN_SPEECH_DURATION = 500;    // ms minimum speech before allowing silence detection

        function setStatus(text, active = false) {
            statusText.textContent = text;
            statusText.className = 'status-text' + (active ? ' active' : '');
        }

        function addMessage(text, type) {
            if (welcome) welcome.style.display = 'none';

            const msg = document.createElement('div');
            msg.className = 'message ' + type;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = type === 'user' ? '🗣' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;

            return bubble;
        }

        function addThinking() {
            if (welcome) welcome.style.display = 'none';

            const msg = document.createElement('div');
            msg.className = 'message ai';
            msg.id = 'thinkingMsg';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeThinking() {
            const el = document.getElementById('thinkingMsg');
            if (el) el.remove();
        }

        function startSilenceDetection(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            speechDetected = false;
            let speechStart = null;

            silenceCheckInterval = setInterval(() => {
                if (!isRecording) return;

                analyser.getByteFrequencyData(dataArray);
                // Average volume
                const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

                if (avg > SILENCE_THRESHOLD) {
                    // Sound detected
                    if (!speechStart) speechStart = Date.now();
                    if (Date.now() - speechStart > MIN_SPEECH_DURATION) {
                        speechDetected = true;
                    }
                    // Reset silence timer
                    if (silenceTimer) {
                        clearTimeout(silenceTimer);
                        silenceTimer = null;
                    }
                } else if (speechDetected && !silenceTimer) {
                    // Silence started after speech
                    silenceTimer = setTimeout(() => {
                        if (isRecording) {
                            stopRecording();
                        }
                    }, SILENCE_DURATION);
                }
            }, 100);
        }

        function stopSilenceDetection() {
            if (silenceCheckInterval) {
                clearInterval(silenceCheckInterval);
                silenceCheckInterval = null;
            }
            if (silenceTimer) {
                clearTimeout(silenceTimer);
                silenceTimer = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            analyser = null;
            speechDetected = false;
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                micContainer.classList.add('recording');
                waveContainer.classList.add('active');
                setStatus('Dinləyirəm...', true);

                // Start silence detection
                startSilenceDetection(stream);
            } catch (err) {
                setStatus('Mikrofon icazəsi lazımdır');
            }
        }

        async function stopRecording() {
            if (!mediaRecorder || !isRecording) return;

            isRecording = false;
            micBtn.classList.remove('recording');
            micContainer.classList.remove('recording');
            waveContainer.classList.remove('active');
            stopSilenceDetection();

            return new Promise(resolve => {
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });

                    // Stop all tracks
                    mediaRecorder.stream.getTracks().forEach(t => t.stop());

                    if (blob.size < 1000) {
                        setStatus('Səs çox qısa idi');
                        setTimeout(() => setStatus(''), 2000);
                        resolve();
                        return;
                    }

                    await sendAudio(blob);
                    resolve();
                };
                mediaRecorder.stop();
            });
        }

        async function sendAudio(blob) {
            isProcessing = true;
            micBtn.classList.add('disabled');
            setStatus('Emal edilir...', true);
            addThinking();

            const formData = new FormData();
            formData.append('audio', blob, 'recording.webm');

            try {
                const res = await fetch('/voice/', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                removeThinking();

                if (data.error) {
                    setStatus('Xəta: ' + data.error);
                    setTimeout(() => setStatus(''), 3000);
                    return;
                }

                addMessage(data.text, 'user');
                addMessage(data.answer, 'ai');

                setStatus('Danışıram...', true);
                await playTTS(data.answer);
                setStatus('');

            } catch (err) {
                removeThinking();
                setStatus('Xəta baş verdi');
                setTimeout(() => setStatus(''), 3000);
            } finally {
                isProcessing = false;
                micBtn.classList.remove('disabled');
            }
        }

        async function playTTS(text) {
            try {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }

                const res = await fetch('/tts/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!res.ok) return;

                const audioBlob = await res.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                currentAudio = audio;

                return new Promise(resolve => {
                    audio.onended = () => {
                        URL.revokeObjectURL(audioUrl);
                        currentAudio = null;
                        resolve();
                    };
                    audio.onerror = () => {
                        URL.revokeObjectURL(audioUrl);
                        currentAudio = null;
                        resolve();
                    };
                    audio.play();
                });
            } catch {
                // TTS failed silently
            }
        }

        // Click to toggle recording
        micBtn.addEventListener('click', e => {
            e.preventDefault();
            if (isProcessing) return;

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        // Prevent context menu on long press (mobile)
        micBtn.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
